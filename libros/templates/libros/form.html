{% extends 'libros/base.html' %}
{% block content %}
<h2>{% if form.instance.pk %}Editar{% else %}Agregar{% endif %} Libro</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-success">Guardar</button>
    <a href="{% url 'lista_libros' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
